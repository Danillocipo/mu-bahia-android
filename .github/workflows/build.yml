name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Aceitar licencas SDK
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses 2>/dev/null || true

      - name: Cache Gradle
        uses: actions/cache@v3
        with:
          path: ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Baixar Wine + Box64 runtime
        run: |
          chmod +x ci_download_runtime.sh
          bash ci_download_runtime.sh

      - name: Build APK Release
        run: ./gradlew assembleRelease --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: mu-bahia-android-v2
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: mu-bahia-android-debug
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: ignore

      - name: Tamanho do APK
        run: |
          echo "APKs gerados:"
          ls -lh app/build/outputs/apk/release/
          ls -lh app/build/outputs/apk/debug/ 2>/dev/null || true
